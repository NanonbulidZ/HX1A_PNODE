[env:rpipico2]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower

; Serial over USB CDC
build_flags =
    -DUSE_TINYUSB
    -DUSB_VID=0x2E8A
    -DUSB_PID=0x000A

; Libraries
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.1
    ; BMI160 via SPI — using DFRobot's library
    https://github.com/DFRobot/DFRobot_BMI160.git

monitor_speed = 115200
upload_protocol = picotool
